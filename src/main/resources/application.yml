server:
  servlet:
    context-path: /blog-server-2 #上下文路径
spring:
  datasource: #设置数据库连接参数
    url: jdbc:mysql://127.0.0.1:3306/db_blog_manage?useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
mybatis:
  type-aliases-package: com.lwzy.blog.bean #设置实体类所在包名
  mapper-locations: classpath:com/lwzy/blog/mapper/**/*.xml
logging:
  level:
    com.lwzy.blog.mapper: debug #设置在控制台输出sql语句日志
    org.thymeleaf: DEBUG
    org.springframework.web.servlet.view: DEBUG
upload: #文件上传配置
  # 本地存储路径
  local-path: D:/uploads/blog/
  # 访问前缀
  access-prefix: /uploads/
  # 允许的图片类型
  allowed-types:
    - image/jpeg
    - image/png
    - image/gif
    - image/webp
  # 最大文件大小（MB）
  max-size: 5
